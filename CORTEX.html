<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
<title>CORTEX — Acompanhamento de Pacientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css" />
<link rel="stylesheet" href="src/polish.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="src/supabase.js"></script>
<script src="src/data.js"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/patients.jsx"></script>
<script type="text/babel" src="src/agenda.jsx"></script>
<script type="text/babel" src="src/patient-detail.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "mainView": "dashboard",
  "density": "confortavel",
  "onlyActive": true
}/*EDITMODE-END*/;

function App() {
  // ── TODOS os hooks ANTES de qualquer return ──────────────────
  // Auth state
  const [authReady, setAuthReady] = React.useState(false);
  const [user, setUser] = React.useState(null);
  const [profile, setProfile] = React.useState(null);

  // UI state
  const stored = (() => { try { return JSON.parse(localStorage.getItem('cortex.state') || '{}'); } catch { return {}; } })();
  const [theme, setTheme] = React.useState(stored.theme || TWEAK_DEFAULTS.theme);
  const [density, setDensity] = React.useState(stored.density || TWEAK_DEFAULTS.density);
  const [onlyActive, setOnlyActive] = React.useState(stored.onlyActive ?? TWEAK_DEFAULTS.onlyActive);
  const [page, setPage] = React.useState(stored.page || 'dashboard');
  const patientsView = 'list'; const setPatientsView = () => {};
  const [selectedPatient, setSelectedPatient] = React.useState(stored.selectedPatient || null);
  const [editMode, setEditMode] = React.useState(false);
  const [, tick] = React.useReducer(x => x + 1, 0);

  // Modal state
  const [showPacienteModal, setShowPacienteModal] = React.useState(false);
  const [showSessaoModal, setShowSessaoModal]     = React.useState(false);
  const [preselectPacId, setPreselectPacId]       = React.useState(null);

  // Auth effect
  React.useEffect(() => {
    (async () => {
      const me = await window.CORTEX_SB.cortexGetMe().catch(() => null);
      if (!me) { window.location.href = 'Login.html'; return; }
      setUser(me);
      const prof = await window.CORTEX_SB.cortexGetProfile(me.id).catch(() => null);
      setProfile(prof);
      if (prof?.clinica_id) { window._clinicaId = prof.clinica_id; await hydratePacientes(prof.clinica_id); }
      setAuthReady(true);
    })();
    window.addEventListener('cortex-session-changed', (e) => {
      if (!e.detail) window.location.href = 'Login.html';
    });
  }, []);

  // Data hydrate
  const hydratePacientes = async (clinicaId) => {
    try {
      const [pacs, sess, clinica] = await Promise.all([
        window.CORTEX_SB.fetchPacientes(clinicaId),
        window.CORTEX_SB.fetchSessoes(clinicaId),
        window.CORTEX_SB.fetchClinica(clinicaId),
      ]);
      if (pacs && pacs.length > 0) window.CORTEX_DATA.PATIENTS = pacs.map(rowToPaciente);
      if (sess && sess.length > 0) window.CORTEX_DATA.CALENDAR = sess.map(rowToCalendar);
      // Cachear config da clínica no localStorage para uso offline/rápido
      if (clinica?.convenios?.length || clinica?.etapas_fluxo?.length) {
        localStorage.setItem('cortex.config.geral', JSON.stringify({
          convenios: clinica.convenios || [],
          etapas: clinica.etapas_fluxo || [],
        }));
      }
      window.dispatchEvent(new CustomEvent('cortex-data-updated'));
    } catch (e) { console.warn('hydratePacientes', e); }
  };

  // Data update listener
  React.useEffect(() => {
    window.addEventListener('cortex-data-updated', tick);
    return () => window.removeEventListener('cortex-data-updated', tick);
  }, []);

  // Persist state
  React.useEffect(() => {
    localStorage.setItem('cortex.state', JSON.stringify({ theme, density, onlyActive, page, patientsView, selectedPatient }));
  }, [theme, density, onlyActive, page, patientsView, selectedPatient]);

  // Theme apply
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('data-density', density === 'compact' ? 'compact' : 'confortavel');
  }, [theme, density]);

  // Tweaks message listener
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // ── Handlers ───────────────────────────────────────────────
  const openPatient = (id) => { setSelectedPatient(id); setPage('patient'); };
  const backToList = () => { setSelectedPatient(null); setPage('pacientes'); };
  const openSessaoModal = (pacId = null) => { setPreselectPacId(pacId); setShowSessaoModal(true); };
  const openPacienteModal = () => setShowPacienteModal(true);

  // ── Loading screen (DEPOIS de todos os hooks) ───────────────
  if (!authReady) return (
    <div style={{display:'grid', placeItems:'center', height:'100vh', background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:48,height:48,borderRadius:12,overflow:'hidden',margin:'0 auto 16px'}}>
          <img src="assets/cortex-logo.png" style={{width:'100%'}} />
        </div>
        <div style={{color:'var(--text-3)', fontSize:14}}>Carregando...</div>
      </div>
    </div>
  );

  const PATIENTS = window.CORTEX_DATA.PATIENTS;
  const activeCount = PATIENTS.filter(p => p.ativo).length;

  const navItems = [
    { id: 'dashboard', label: 'Dashboard',         icon: <I.dash />,   count: null },
    { id: 'pacientes', label: 'Pacientes',          icon: <I.users />,  count: activeCount },
    { id: 'agenda',    label: 'Agenda',             icon: <I.cal />,    count: null },
    { id: 'testes',    label: 'Catálogo de testes', icon: <I.flask />,  count: null },
    { id: 'config',    label: 'Configurações',      icon: <I.settings />, count: null },
  ];

  const crumb = page === 'patient' ? (PATIENTS.find(p => p.id === selectedPatient)?.nome || '') : null;

  return (
    <div className="app">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark"><img src="assets/cortex-logo.png" alt="CORTEX" /></div>
          <div className="brand-text">
            <strong>CORTEX</strong>
            <span>Neuropsicologia</span>
          </div>
        </div>

        <div className="nav-section-label">Navegação</div>
        {navItems.map(n => (
          <div key={n.id} className={"nav-item" + (page === n.id || (n.id === 'pacientes' && page === 'patient') ? ' active' : '')}
               onClick={() => { setPage(n.id); if (n.id !== 'patient') setSelectedPatient(null); }}>
            {n.icon}
            <span>{n.label}</span>
            {n.count !== null && <span className="count">{n.count}</span>}
          </div>
        ))}

        <div className="nav-section-label" style={{marginTop: 8}}>Atalhos</div>
        <div className="nav-item" onClick={openPacienteModal}><I.plus /> <span>Novo paciente</span></div>
        <div className="nav-item"><I.bell /> <span>Alertas</span><span className="count" style={{color:'var(--danger)'}}>3</span></div>

        <div className="sidebar-footer">
          <div className="user-card" style={{cursor:'pointer'}} onClick={async () => {
            if (confirm('Sair do CORTEX?')) {
              await window.CORTEX_SB.cortexSignOut();
              window.location.href = 'Login.html';
            }
          }}>
            <div className="avatar" style={{
              background: 'linear-gradient(135deg, var(--teal-500), var(--pink-500))',
              display:'grid', placeItems:'center', color:'white', fontWeight:700, fontSize:13,
              overflow:'hidden', padding:0,
            }}>
              {profile?.avatar_url
                ? <img src={profile.avatar_url} alt="foto" style={{width:'100%',height:'100%',objectFit:'cover'}} />
                : (profile?.nome || user?.email || 'U').slice(0,2).toUpperCase()
              }
            </div>
            <div className="meta">
              <strong>{profile?.nome || user?.email?.split('@')[0] || 'Usuário'}</strong><br/>
              <span>{profile?.especialidade || 'Neuropsicóloga'}</span>
            </div>
          </div>
        </div>
      </aside>

      {/* Content */}
      <div className="content">
        <header className="topbar">
          <div className="crumbs">
            {page !== 'patient' ? <b>{(navItems.find(n => n.id === page) || {label:'Dashboard'}).label}</b> : <>Pacientes / <b>{crumb}</b></>}
          </div>
          <div className="search">
            <I.search style={{width:14,height:14, color:'var(--text-3)'}} />
            <input placeholder="Buscar paciente, teste, sessão..." />
            <span className="kbd">⌘K</span>
          </div>
          <button className="icon-btn" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} title="Tema">
            {theme === 'dark' ? <I.sun /> : <I.moon />}
          </button>
          <button className="icon-btn" title="Notificações"><I.bell /></button>
          <button className="primary-btn" onClick={() => setShowSessaoModal(true)}><I.plus /> Sessão</button>
        </header>

        <main className="scroll-area">
          {page === 'dashboard' && <Dashboard onOpenPatient={openPatient} onGoTo={setPage} onNewSessao={openSessaoModal} onNewPaciente={openPacienteModal} />}
          {page === 'pacientes' && (
            <>
              <PatientsViewWithToggle view={patientsView} setView={setPatientsView} onOpenPatient={openPatient} showOnlyActive={onlyActive} onNewPaciente={openPacienteModal} />
            </>
          )}
          {page === 'agenda' && <AgendaView onOpenPatient={openPatient} onNewSessao={openSessaoModal} />}
          {page === 'testes' && <TestCatalogView />}
          {page === 'patient' && <PatientDetail patientId={selectedPatient} onBack={backToList} onGoTo={setPage} onNewSessao={openSessaoModal} />}
          {page === 'config' && <ConfigPage profile={profile} user={user} onProfileUpdate={(p) => setProfile(p)} />}
        </main>
      </div>

      {/* Modais globais */}
      {showPacienteModal && (
        <ModalNovoPaciente
          onClose={() => setShowPacienteModal(false)}
          onSaved={() => {}}
          profile={profile} user={user}
        />
      )}
      {showSessaoModal && (
        <ModalAgendarSessao
          pacientes={window.CORTEX_DATA.PATIENTS.filter(p => p.ativo)}
          onClose={() => setShowSessaoModal(false)}
          onSaved={() => {}}
          profile={profile} user={user}
          preselectedPacId={preselectPacId}
        />
      )}


    </div>
  );
}

function PatientsViewWithToggle({ view, setView, onOpenPatient, showOnlyActive, onNewPaciente }) {
  return <PatientsView view="list" onOpenPatient={onOpenPatient} showOnlyActive={showOnlyActive} viewToggle={null} onNewPaciente={onNewPaciente} />;
}

function TestCatalogView() {
  const { TEST_CATALOG } = window.CORTEX_DATA;
  const [q, setQ] = React.useState('');
  const [filtPop, setFiltPop] = React.useState('Todos');

  const populacoes = ['Todos', 'Criança', 'Adolescente', 'Adulto', 'Idoso'];
  const totalTestes = Object.values(TEST_CATALOG).reduce((s, arr) => s + arr.length, 0);

  const filteredCatalog = Object.fromEntries(
    Object.entries(TEST_CATALOG).map(([cat, tests]) => {
      let filtered = tests;
      if (filtPop !== 'Todos') filtered = filtered.filter(t => t.populacao?.includes(filtPop));
      if (q.trim()) {
        const ql = q.toLowerCase();
        filtered = filtered.filter(t => t.name.toLowerCase().includes(ql) || t.avalia?.toLowerCase().includes(ql));
      }
      return [cat, filtered];
    }).filter(([, tests]) => tests.length > 0)
  );

  return (
    <div>
      <div className="section-head">
        <h2>Catálogo de instrumentos</h2>
        <span className="sub">{totalTestes} instrumentos · Equilibrium Neuropsicologia</span>
      </div>

      {/* Filtros */}
      <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:18, flexWrap:'wrap'}}>
        <div className="topbar search" style={{background:'var(--surface)', margin:0, width:260}}>
          <I.search style={{width:14, height:14, color:'var(--text-3)'}} />
          <input placeholder="Buscar instrumento..." value={q} onChange={e=>setQ(e.target.value)} />
        </div>
        {populacoes.map(p => (
          <button key={p} onClick={() => setFiltPop(p)}
            className={"chip-filter" + (filtPop === p ? " active" : "")}>
            {p}
          </button>
        ))}
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px, 1fr))', gap:14}}>
        {Object.entries(filteredCatalog).map(([cat, tests]) => (
          <div className="card" key={cat}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
              <h3 style={{margin:0, fontSize:14}}>{cat}</h3>
              <span style={{fontSize:11, color:'var(--text-3)', fontWeight:600}}>{tests.length} instrumento{tests.length !== 1 ? 's':''}</span>
            </div>
            {tests.map(t => (
              <div key={t.id} style={{display:'flex', alignItems:'flex-start', gap:10, padding:'9px 0', borderTop:'1px dashed var(--border)'}}>
                <I.flask style={{width:13, height:13, color:'var(--teal-500)', marginTop:2, flexShrink:0}} />
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:13.5, fontWeight:600, marginBottom:2}}>{t.name}</div>
                  <div style={{fontSize:12, color:'var(--text-3)', lineHeight:1.4}}>{t.avalia}</div>
                </div>
                <span style={{fontSize:11, color:'var(--text-3)', whiteSpace:'nowrap', fontFamily:'var(--font-mono)', paddingTop:2}}>{t.faixa}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
      {Object.keys(filteredCatalog).length === 0 && (
        <div style={{textAlign:'center', padding:40, color:'var(--text-3)'}}>
          <I.flask style={{width:32, height:32, margin:'0 auto 12px'}} />
          <div>Nenhum instrumento encontrado para este filtro.</div>
        </div>
      )}
    </div>
  );
}

function TweaksPanel({ theme, setTheme, density, setDensity, onlyActive, setOnlyActive, patientsView, setPatientsView, mainPage, setMainPage }) {
  function persist(edits) {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }
  return (
    <div className="tweaks-panel open">
      <h4><I.sliders /> Tweaks</h4>
      <div className="sub">Ajuste o ambiente ao seu gosto</div>

      <div className="tweak">
        <div className="lbl">Tema</div>
        <div className="seg">
          <button className={theme==='light'?'active':''} onClick={()=>{setTheme('light'); persist({theme:'light'});}}><I.sun /> Claro</button>
          <button className={theme==='dark'?'active':''} onClick={()=>{setTheme('dark'); persist({theme:'dark'});}}><I.moon /> Escuro</button>
        </div>
      </div>

      <div className="tweak">
        <div className="lbl">Visão principal de Pacientes</div>
        <div className="seg">
          <button className={patientsView==='kanban'?'active':''} onClick={()=>setPatientsView('kanban')}><I.board /> Kanban</button>
          <button className={patientsView==='list'?'active':''} onClick={()=>setPatientsView('list')}><I.list /> Lista</button>
        </div>
      </div>

      <div className="tweak">
        <div className="lbl">Densidade</div>
        <div className="seg">
          <button className={density==='confortavel'?'active':''} onClick={()=>{setDensity('confortavel'); persist({density:'confortavel'});}}>Confortável</button>
          <button className={density==='compact'?'active':''} onClick={()=>{setDensity('compact'); persist({density:'compact'});}}>Compacto</button>
        </div>
      </div>

      <div className="tweak">
        <div className="lbl">Filtros rápidos</div>
        <div className="swrow">
          <span>Mostrar apenas pacientes ativos</span>
          <div className={"switch" + (onlyActive ? " on" : "")} onClick={()=>{setOnlyActive(!onlyActive); persist({onlyActive: !onlyActive});}} />
        </div>
      </div>

      <div className="tweak">
        <div className="lbl">Ir para</div>
        <div style={{display:'flex', flexWrap:'wrap', gap:6}}>
          {['dashboard','pacientes','agenda'].map(p => (
            <button key={p} className={"chip-filter" + (mainPage === p ? " active" : "")} onClick={()=>setMainPage(p)}>{p}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Mapeamento DB → frontend ──────────────────────────────────
function rowToPaciente(r) {
  return {
    id: r.id,
    nome: r.nome,
    idade: r.data_nasc ? Math.floor((new Date() - new Date(r.data_nasc)) / (365.25*24*3600*1000)) : 0,
    dataNasc: r.data_nasc,
    cpf: r.cpf || '***.***.***-**',
    escolaridade: r.escolaridade || '—',
    escola: r.escola || '—',
    tipo: r.tipo || 'Adulto',
    responsavel: r.responsavel || '—',
    telefone: r.telefone || '—',
    email: r.email || '—',
    endereco: r.endereco || '—',
    convenio: r.convenio || 'Particular',
    encaminhadoPor: r.encaminhado_por || '—',
    queixa: r.queixa || '—',
    estagio: r.estagio || 'anamnese',
    progresso: r.progresso || 0,
    inicio: r.inicio,
    previsaoLaudo: r.previsao_laudo,
    ativo: r.ativo !== false,
    corAvatar: r.cor_avatar || 'violet',
    avatar_url: r.avatar_url || null,
    criadoEm: r.created_at?.slice(0,10),
    diasNaEtapa: 0,
    testes: [], sessoes: [], hipoteses: [],
    anamnese: { completude: 0, secoes: {} },
  };
}
function rowToCalendar(r) {
  return {
    pacId: r.paciente_id, id: r.id,
    titulo: r.titulo, tipo: r.tipo,
    data: r.data, hora: r.hora || '09:00',
    duracao: r.duracao || 60,
    notas: r.notas,
  };
}
window.rowToPaciente = rowToPaciente;

// Helper global: lista convênios ativos (cache localStorage ou defaults)
window.getConveniosAtivos = () => {
  try {
    const saved = JSON.parse(localStorage.getItem('cortex.config.geral') || '{}');
    if (saved.convenios?.length) return saved.convenios.filter(c => c.ativo).map(c => c.nome);
  } catch {}
  return ['Particular','Unimed','Bradesco Saúde','SulAmérica','Amil','Hapvida','GNDI'];
};
window.rowToCalendar = rowToCalendar;

// ── Modal Novo Paciente ───────────────────────────────────────
function ModalNovoPaciente({ onClose, onSaved, profile, user }) {
  const [form, setForm] = React.useState({
    nome:'', tipo:'Criança', data_nasc:'', escolaridade:'', escola:'',
    responsavel:'', telefone:'', email:'', convenio:'Particular',
    encaminhado_por:'', queixa:'', cor_avatar:'violet',
  });
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState('');

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const save = async (e) => {
    e.preventDefault();
    if (!form.nome.trim()) { setErr('Nome obrigatório'); return; }
    setSaving(true); setErr('');
    try {
      const dadosPac = { ...form };
      if (!dadosPac.data_nasc)      dadosPac.data_nasc      = null;
      if (!dadosPac.previsao_laudo) dadosPac.previsao_laudo = null;
      const pac = await window.CORTEX_SB.createPaciente({
        ...dadosPac,
        inicio: new Date().toISOString().slice(0,10),
        estagio: 'anamnese', progresso: 0, ativo: true,
      }, profile.clinica_id, user.id);
      window.CORTEX_DATA.PATIENTS = [rowToPaciente(pac), ...window.CORTEX_DATA.PATIENTS];
      window.dispatchEvent(new CustomEvent('cortex-data-updated'));
      onSaved?.(pac);
      onClose();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  const inp = {width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text)', fontFamily:'inherit', fontSize:13, outline:'none'};
  const lbl = {display:'block', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', color:'var(--text-3)', marginBottom:5};

  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(4px)',display:'grid',placeItems:'center',padding:24}} onClick={onClose}>
      <form onSubmit={save} onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderRadius:16,padding:28,width:'min(640px,100%)',maxHeight:'88vh',overflowY:'auto',boxShadow:'0 24px 60px rgba(0,0,0,0.4)',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18}}>Novo paciente</h2>
          <button type="button" onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:20,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'span 2'}}>
            <label style={lbl}>Nome completo *</label>
            <input value={form.nome} onChange={e=>set('nome',e.target.value)} style={inp} placeholder="Helena Ribeiro Campos" autoFocus />
          </div>
          <div>
            <label style={lbl}>Tipo</label>
            <select value={form.tipo} onChange={e=>set('tipo',e.target.value)} style={inp}>
              {['Criança','Adolescente','Adulto','Idoso'].map(t=><option key={t}>{t}</option>)}

            <label style={lbl}>Data de nascimento</label>

            <label style={lbl}>Responsável</label>
            <input value={form.responsavel} onChange={e=>set('responsavel',e.target.value)} style={inp} placeholder="Nome (relação)" />
          </div>
          <div>
            <label style={lbl}>Telefone</label>
            <input value={form.telefone} onChange={e=>set('telefone',e.target.value)} style={inp} placeholder="(11) 98421-0022" />

            <input value={form.encaminhado_por} onChange={e=>set('encaminhado_por',e.target.value)} style={inp} placeholder="Dra. Sofia Lins" />

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
          <button type="button" onClick={onClose} style={{padding:'10px 18px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface-2)',color:'var(--text-2)',cursor:'pointer',fontSize:13}}>Cancelar</button>
          <button type="submit" disabled={saving} style={{padding:'10px 20px',borderRadius:8,border:'none',background:'linear-gradient(135deg,var(--teal-500),var(--pink-500))',color:'white',fontWeight:600,cursor:'pointer',fontSize:13}}>
            {saving ? 'Salvando...' : '+ Criar paciente'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── Modal Agendar Sessão ──────────────────────────────────────
function ModalAgendarSessao({ pacientes, onClose, onSaved, profile, user, preselectedPacId }) {
  const [form, setForm] = React.useState({
    paciente_id: preselectedPacId || (pacientes[0]?.id || ''),
    titulo:'', tipo:'Aplicação',
    data: new Date().toISOString().slice(0,10),
    hora:'09:00', duracao:60, notas:'',
  });
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState('');

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const save = async (e) => {
    e.preventDefault();
    if (!form.paciente_id || !form.titulo.trim()) { setErr('Selecione o paciente e informe o título.'); return; }
    setSaving(true); setErr('');
    try {
      const sessao = await window.CORTEX_SB.createSessao(form, profile.clinica_id, user.id);
      window.CORTEX_DATA.CALENDAR = [...window.CORTEX_DATA.CALENDAR, rowToCalendar(sessao)];
      window.dispatchEvent(new CustomEvent('cortex-data-updated'));
      onSaved?.(sessao);
      onClose();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  const inp = {width:'100%', padding:'9px 12px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text)', fontFamily:'inherit', fontSize:13, outline:'none'};
  const lbl = {display:'block', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', color:'var(--text-3)', marginBottom:5};

  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(4px)',display:'grid',placeItems:'center',padding:24}} onClick={onClose}>
      <form onSubmit={save} onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',borderRadius:16,padding:28,width:'min(520px,100%)',boxShadow:'0 24px 60px rgba(0,0,0,0.4)',border:'1px solid var(--border)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:18}}>Agendar sessão</h2>
          <button type="button" onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:20,cursor:'pointer'}}>✕</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
          <div style={{gridColumn:'span 2'}}>
            <label style={lbl}>Paciente</label>
            <select value={form.paciente_id} onChange={e=>set('paciente_id',e.target.value)} style={inp}>
              {pacientes.map(p=><option key={p.id} value={p.id}>{p.nome}</option>)}
            </select>
          </div>
          <div style={{gridColumn:'span 2'}}>
            <label style={lbl}>Título da sessão</label>
            <input value={form.titulo} onChange={e=>set('titulo',e.target.value)} style={inp} placeholder="Aplicação WISC-V" autoFocus />
          </div>
          <div>
            <label style={lbl}>Tipo</label>
            <select value={form.tipo} onChange={e=>set('tipo',e.target.value)} style={inp}>
              {['Anamnese','Aplicação','Correção','Devolutiva','Laudo','Planejamento'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Duração (min)</label>
            <input type="number" value={form.duracao} onChange={e=>set('duracao',+e.target.value)} style={inp} min={15} step={15} />
          </div>
          <div>
            <label style={lbl}>Data</label>
            <input type="date" value={form.data} onChange={e=>set('data',e.target.value)} style={inp} />
          </div>
          <div>
            <label style={lbl}>Horário</label>
            <input type="time" value={form.hora} onChange={e=>set('hora',e.target.value)} style={inp} />
          </div>
          <div style={{gridColumn:'span 2'}}>
            <label style={lbl}>Observações</label>
            <textarea value={form.notas} onChange={e=>set('notas',e.target.value)} rows={2} style={{...inp,resize:'vertical'}} />
          </div>
        </div>

        {err && <div style={{marginTop:12,padding:'9px 12px',borderRadius:8,background:'color-mix(in oklab,var(--danger) 12%,var(--surface))',color:'var(--danger)',fontSize:13}}>⚠ {err}</div>}

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
          <button type="button" onClick={onClose} style={{padding:'10px 18px',borderRadius:8,border:'1px solid var(--border)',background:'var(--surface-2)',color:'var(--text-2)',cursor:'pointer',fontSize:13}}>Cancelar</button>
          <button type="submit" disabled={saving} style={{padding:'10px 20px',borderRadius:8,border:'none',background:'linear-gradient(135deg,var(--teal-500),var(--pink-500))',color:'white',fontWeight:600,cursor:'pointer',fontSize:13}}>
            {saving ? 'Salvando...' : '+ Agendar'}
          </button>
        </div>
      </form>
    </div>
  );
}

// ── Página de Configurações ───────────────────────────────────
function ConfigPage({ profile, user, onProfileUpdate }) {
  const [tab, setTab] = React.useState('perfil');
  const SB = window.CORTEX_SB;

  // ── Aba Perfil ──────────────────────────────────────────────
  const PerfilTab = () => {
    const [form, setForm] = React.useState({
      nome: profile?.nome || '',
      email: profile?.email || user?.email || '',
      especialidade: profile?.especialidade || '',
      crm: profile?.crm || '',
      telefone: profile?.telefone || '',
    });
    const [fotoUrl, setFotoUrl] = React.useState(profile?.avatar_url || null);
    const [saving, setSaving] = React.useState(false);
    const [msg, setMsg] = React.useState('');
    const set = (k, v) => setForm(f => ({...f, [k]: v}));

    const save = async () => {
      setSaving(true); setMsg('');
      try {
        const patch = { nome: form.nome, especialidade: form.especialidade };
        if (fotoUrl !== (profile?.avatar_url || null)) patch.avatar_url = fotoUrl;
        await SB.cortexUpdateProfile(user.id, patch);
        onProfileUpdate?.({ ...profile, ...patch });
        setMsg('✓ Perfil salvo!');
        setTimeout(() => setMsg(''), 3000);
      } catch(e) { setMsg('⚠ ' + e.message); }
      finally { setSaving(false); }
    };

    const inp = {width:'100%', padding:'10px 14px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text)', fontFamily:'inherit', fontSize:14, outline:'none'};
    const lbl = {display:'block', fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.05em', color:'var(--text-3)', marginBottom:6};

    return (
      <div style={{maxWidth:600}}>
        <h3 style={{marginBottom:24, fontSize:16}}>Meu perfil</h3>
        <div style={{display:'flex', gap:32, alignItems:'flex-start', marginBottom:24}}>
          <FotoUpload src={fotoUrl} onFile={setFotoUrl} size={96} shape="round" label="Trocar foto" />
          <div style={{flex:1, display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
            <div style={{gridColumn:'span 2'}}>
              <label style={lbl}>Nome completo</label>
              <input value={form.nome} onChange={e=>set('nome',e.target.value)} style={inp} placeholder="Dra. Wessilon Marques" />
            </div>
            <div>
              <label style={lbl}>E-mail</label>
              <input value={form.email} disabled style={{...inp, opacity:0.5}} />
            </div>
            <div>
              <label style={lbl}>Especialidade</label>
              <input value={form.especialidade} onChange={e=>set('especialidade',e.target.value)} style={inp} placeholder="Neuropsicóloga" />
            </div>
            <div>
              <label style={lbl}>CRP / CRM</label>
              <input value={form.crm} onChange={e=>set('crm',e.target.value)} style={inp} placeholder="04/00000" />
            </div>
            <div>
              <label style={lbl}>Telefone / WhatsApp</label>
              <input value={form.telefone} onChange={e=>set('telefone',e.target.value)} style={inp} placeholder="(34) 99999-9999" />
            </div>
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <button onClick={save} disabled={saving} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'10px 22px',borderRadius:8,border:'none',background:'linear-gradient(135deg,var(--teal-500),var(--pink-500))',color:'white',fontWeight:600,cursor:'pointer',fontSize:14}}>
            <I.save style={{width:15,height:15}} /> {saving ? 'Salvando...' : 'Salvar alterações'}
          </button>
          {msg && <span style={{fontSize:13, color: msg.startsWith('✓') ? 'var(--teal-500)' : 'var(--danger)'}}>{msg}</span>}
        </div>
      </div>
    );
  };
  // ── Aba Geral ───────────────────────────────────────────────
  const GeralTab = () => {
    const DEFAULTS_CONVENIOS = [
      { id: 1, nome: 'Particular', ativo: true },
      { id: 2, nome: 'Unimed', ativo: true },
      { id: 3, nome: 'Bradesco Saúde', ativo: true },
    ];
    const DEFAULTS_ETAPAS = ['Anamnese','Hipóteses','Checklist','Bateria de Testes','Correção','Laudo','Devolutiva'];

    const [convenios, setConvenios] = React.useState(DEFAULTS_CONVENIOS);
    const [etapas, setEtapas] = React.useState(DEFAULTS_ETAPAS);
    const [novoConvenio, setNovoConvenio] = React.useState('');
    const [novaEtapa, setNovaEtapa] = React.useState('');
    const [msgG, setMsgG] = React.useState('');
    const [loading, setLoading] = React.useState(true);

    // Carregar do Supabase ao montar
    React.useEffect(() => {
      if (!profile?.clinica_id) { setLoading(false); return; }
      SB.fetchClinica(profile.clinica_id)
        .then(clinica => {
          if (clinica?.convenios?.length)   setConvenios(clinica.convenios);
          if (clinica?.etapas_fluxo?.length) setEtapas(clinica.etapas_fluxo);
        })
        .catch(() => {})
        .finally(() => setLoading(false));
    }, []);

    const saveConfig = async (newConvenios, newEtapas) => {
      try {
        await SB.updateClinica(profile.clinica_id, {
          convenios: newConvenios,
          etapas_fluxo: newEtapas,
        });
        // Também salvar no localStorage como cache local
        localStorage.setItem('cortex.config.geral', JSON.stringify({ convenios: newConvenios, etapas: newEtapas }));
        setMsgG('✓ Salvo!'); setTimeout(() => setMsgG(''), 2000);
      } catch(e) {
        setMsgG('⚠ Erro ao salvar: ' + e.message); setTimeout(() => setMsgG(''), 4000);
      }
    };

    const addConvenio = () => {
      if (!novoConvenio.trim()) return;
      const updated = [...convenios, { id: Date.now(), nome: novoConvenio.trim(), ativo: true }];
      setConvenios(updated);
      saveConfig(updated, etapas);
      setNovoConvenio('');
    };
    const toggleConvenio = (id) => {
      const updated = convenios.map(c => c.id === id ? {...c, ativo: !c.ativo} : c);
      setConvenios(updated);
      saveConfig(updated, etapas);
    };
    const removeConvenio = (id) => {
      const updated = convenios.filter(c => c.id !== id);
      setConvenios(updated);
      saveConfig(updated, etapas);
    };

    const addEtapa = () => {
      if (!novaEtapa.trim()) return;
      const updated = [...etapas, novaEtapa.trim()];
      setEtapas(updated);
      saveConfig(convenios, updated);
      setNovaEtapa('');
    };
    const removeEtapa = (i) => {
      const updated = etapas.filter((_, idx) => idx !== i);
      setEtapas(updated);
      saveConfig(convenios, updated);
    };

    if (loading) return <div style={{color:'var(--text-3)', padding:20}}>Carregando configurações...</div>;

    const inp = {flex:1, padding:'10px 14px', borderRadius:8, border:'1px solid var(--border)', background:'var(--surface-2)', color:'var(--text)', fontFamily:'inherit', fontSize:14, outline:'none'};
    const addBtn = {padding:'10px 18px', borderRadius:8, border:'none', background:'var(--teal-500)', color:'white', fontWeight:600, cursor:'pointer', fontSize:13, whiteSpace:'nowrap'};

    return (
      <div style={{maxWidth:640}}>
        <h3 style={{marginBottom:20, fontSize:16}}>Configurações gerais</h3>

        {/* Convênios */}
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
            <h4 style={{margin:0}}>Convênios</h4>
            <span style={{fontSize:12, color:'var(--text-3)'}}>{convenios.filter(c=>c.ativo).length} ativos</span>
          </div>
          <div style={{display:'flex', gap:8, marginBottom:14}}>
            <input value={novoConvenio} onChange={e=>setNovoConvenio(e.target.value)}
              onKeyDown={e=>e.key==='Enter' && addConvenio()}
              style={inp} placeholder="Nome do convênio..." />
            <button onClick={addConvenio} style={addBtn}>+ Adicionar</button>
          </div>
          <div style={{display:'flex', flexDirection:'column', gap:6}}>
            {convenios.map(c => (
              <div key={c.id} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 12px', borderRadius:8, background:'var(--surface-2)', border:'1px solid var(--border)'}}>
                <div onClick={() => toggleConvenio(c.id)} style={{width:18, height:18, borderRadius:5, border:`2px solid ${c.ativo ? 'var(--teal-500)' : 'var(--border)'}`, background: c.ativo ? 'var(--teal-500)' : 'transparent', display:'grid', placeItems:'center', cursor:'pointer', flexShrink:0}}>
                  {c.ativo && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
                </div>
                <span style={{flex:1, fontSize:14, color: c.ativo ? 'var(--text)' : 'var(--text-3)'}}>{c.nome}</span>
                <button onClick={() => removeConvenio(c.id)} style={{background:'none', border:'none', color:'var(--text-3)', cursor:'pointer', padding:4, display:'grid', placeItems:'center'}}
                  onMouseEnter={e=>e.currentTarget.style.color='var(--danger)'}
                  onMouseLeave={e=>e.currentTarget.style.color='var(--text-3)'}>
                  <I.trash style={{width:14, height:14}} />
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Etapas do fluxo */}
        <div className="card" style={{marginBottom:20}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
            <h4 style={{margin:0}}>Etapas do fluxo de avaliação</h4>
          </div>
          <div style={{display:'flex', gap:8, marginBottom:14}}>
            <input value={novaEtapa} onChange={e=>setNovaEtapa(e.target.value)}
              onKeyDown={e=>e.key==='Enter' && addEtapa()}
              style={inp} placeholder="Nova etapa..." />
            <button onClick={addEtapa} style={addBtn}>+ Adicionar</button>
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
            {etapas.map((e, i) => (
              <div key={i} style={{display:'inline-flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:999, background:'var(--surface-2)', border:'1px solid var(--border)', fontSize:13}}>
                <span>{e}</span>
                <button onClick={() => removeEtapa(i)} style={{background:'none', border:'none', color:'var(--text-3)', cursor:'pointer', padding:'0 0 0 4px', fontSize:14, lineHeight:1}}
                  onMouseEnter={e=>e.currentTarget.style.color='var(--danger)'}
                  onMouseLeave={e=>e.currentTarget.style.color='var(--text-3)'}>✕</button>
              </div>
            ))}
          </div>
        </div>

        {msgG && <div style={{fontSize:13, color:'var(--teal-500)', fontWeight:600}}>{msgG}</div>}
      </div>
    );
  };

  const tabs = [
    { id: 'perfil', label: 'Meu Perfil' },
    { id: 'geral',  label: 'Configurações Gerais' },
  ];

  return (
    <div>
      <div className="section-head" style={{marginBottom:20}}>
        <h2>Configurações</h2>
      </div>
      {/* Tab bar */}
      <div style={{display:'flex', gap:4, borderBottom:'1px solid var(--border)', marginBottom:24}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding:'10px 20px', background:'none', border:'none',
            borderBottom: `2px solid ${tab===t.id ? 'var(--teal-500)' : 'transparent'}`,
            color: tab===t.id ? 'var(--teal-500)' : 'var(--text-2)',
            fontWeight: tab===t.id ? 600 : 400,
            fontSize:14, cursor:'pointer', fontFamily:'inherit',
            marginBottom:-1,
          }}>{t.label}</button>
        ))}
      </div>
      {tab === 'perfil' && <PerfilTab />}
      {tab === 'geral'  && <GeralTab />}
    </div>
  );
}

Object.assign(window, { App, TweaksPanel, TestCatalogView, PatientsViewWithToggle, ModalNovoPaciente, ModalAgendarSessao, rowToPaciente, rowToCalendar });

(function renderApp() {
  if (typeof window.App === 'function' && window.CORTEX_DATA) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  } else {
    setTimeout(renderApp, 50);
  }
})();
